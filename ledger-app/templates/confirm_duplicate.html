<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认重复记账 - 极简记账助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800">💰 极简记账助手</h1>
                <div class="space-x-4">
                    <a href="/" class="text-blue-600 hover:text-blue-800 font-medium">记账</a>
                    <a href="/records" class="text-gray-600 hover:text-gray-800">流水</a>
                    <a href="/stats" class="text-gray-600 hover:text-gray-800">统计</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="text-center mb-6">
                <div class="text-5xl mb-4">🔄</div>
                <h2 class="text-xl font-bold text-gray-800">检测到重复记账</h2>
                <p class="text-gray-600 mt-2">检测到最近5分钟内可能有相同的记账记录</p>
            </div>

            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">金额：</span>
                    <span class="text-2xl font-bold {{ 'text-red-600' if type == 'expense' else 'text-green-600' }}">
                        {{ '-' if type == 'expense' else '+' }}{{ "%.2f"|format(amount) }} 元
                    </span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">类型：</span>
                    <span class="text-gray-800">{{ '支出' if type == 'expense' else '收入' }}</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">分类：</span>
                    <span class="text-gray-800">{{ category }}</span>
                </div>
                {% if note %}
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">备注：</span>
                    <span class="text-gray-800">{{ note }}</span>
                </div>
                {% endif %}
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">日期：</span>
                    <span class="text-gray-800">{{ date }}</span>
                </div>
            </div>

            <p class="text-center text-gray-500 mb-4">是否继续添加这笔记录？</p>

            <div class="flex space-x-3">
                <a href="/cancel_record"
                    class="flex-1 bg-gray-200 text-gray-700 py-3 px-4 rounded-md hover:bg-gray-300 transition-colors text-center font-medium min-h-[44px] flex items-center justify-center">
                    取消
                </a>
                <form action="/confirm_record" method="POST" class="flex-1">
                    <input type="hidden" name="amount" value="{{ amount }}">
                    <input type="hidden" name="type" value="{{ type }}">
                    <input type="hidden" name="category" value="{{ category }}">
                    <input type="hidden" name="note" value="{{ note }}">
                    <input type="hidden" name="date" value="{{ date }}">
                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 transition-colors font-medium min-h-[44px]">
                        确认添加
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
