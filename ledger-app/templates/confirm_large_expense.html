<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认大额支出 - 极简记账助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <h1 class="text-xl font-bold text-gray-800">💰 极简记账助手</h1>
                <div class="flex flex-wrap gap-2 sm:gap-4">
                    <a href="/" class="text-gray-600 hover:text-gray-800">记账</a>
                    <a href="/records" class="text-gray-600 hover:text-gray-800">流水</a>
                    <a href="/calendar" class="text-gray-600 hover:text-gray-800">日历</a>
                    <a href="/stats" class="text-gray-600 hover:text-gray-800">统计</a>
                    <a href="/challenges" class="text-gray-600 hover:text-gray-800">挑战</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="text-center mb-6">
                <div class="text-5xl mb-4">⚠️</div>
                <h2 class="text-xl font-bold text-gray-800">大额支出提醒</h2>
                <p class="text-gray-600 mt-2">这笔支出超过500元，请确认</p>
            </div>

            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">金额：</span>
                    <span class="text-2xl font-bold text-red-600">-{{ "%.2f"|format(amount) }} 元</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">类型：</span>
                    <span class="text-gray-800">支出</span>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">分类：</span>
                    <span class="text-gray-800">{{ category }}</span>
                </div>
                {% if note %}
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">备注：</span>
                    <span class="text-gray-800">{{ note }}</span>
                </div>
                {% endif %}
                <div class="flex justify-between items-center mt-2">
                    <span class="text-gray-600">日期：</span>
                    <span class="text-gray-800">{{ date }}</span>
                </div>
            </div>

            <p class="text-center text-gray-500 mb-4">确认添加这笔支出吗？</p>

            <div class="flex space-x-3">
                <a href="/cancel_record"
                    class="flex-1 bg-gray-200 text-gray-700 py-3 px-4 rounded-md hover:bg-gray-300 transition-colors text-center font-medium min-h-[44px] flex items-center justify-center">
                    取消
                </a>
                <form action="/confirm_large_expense" method="POST" class="flex-1">
                    <input type="hidden" name="amount" value="{{ amount }}">
                    <input type="hidden" name="type" value="{{ type }}">
                    <input type="hidden" name="category" value="{{ category }}">
                    <input type="hidden" name="note" value="{{ note }}">
                    <input type="hidden" name="date" value="{{ date }}">
                    <button type="submit"
                        class="w-full bg-red-600 text-white py-3 px-4 rounded-md hover:bg-red-700 transition-colors font-medium min-h-[44px]">
                        确认添加
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
